<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de Factures — Dujardin Automobile</title>
<link rel="icon" type="image/png" sizes="16x16" href="../logo_dujardin_fondblanc.png">
<link rel="icon" type="image/png" sizes="32x32" href="../logo_dujardin_fondblanc.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f0f0;
    color: #1a1a1a;
  }

  /* ════════ FORM ════════ */
  .form-view {
    max-width: 720px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .form-header { text-align: center; margin-bottom: 32px; }
  .form-header .fh-logo { display: inline-block; }
  .form-header .fh-logo img { max-width: 220px; height: auto; }
  .form-header .fh-sub { font-size: 12px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: #1a1a1a; }
  .form-header h2 { margin-top: 16px; font-size: 20px; font-weight: 700; }
  .form-header p { font-size: 13px; color: #888; margin-top: 4px; }

  .card {
    background: #fff; border-radius: 8px; padding: 24px;
    margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .card h3 {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2.5px; color: #C0392B; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid #f0f0f0;
  }

  .row { display: flex; gap: 12px; margin-bottom: 12px; }
  .row > * { flex: 1; }

  label {
    display: block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px; color: #999; margin-bottom: 4px;
  }

  input, select, textarea {
	    width: 100%; padding: 9px 12px; border: 1px solid #e0e0e0;
	    border-radius: 5px; font-family: 'DM Sans', sans-serif;
	    font-size: 13px; color: #1a1a1a; background: #fafafa;
	    transition: border-color 0.2s, background-color 0.2s;
	  }
	  input::placeholder, textarea::placeholder { color: #d8d8d8; }
	  input:focus, select:focus, textarea:focus { outline: none; border-color: #C0392B; background: #fff; }
	  input.invalid { border-color: #C0392B; background: #fff0f0; }
	  textarea { resize: vertical; min-height: 60px; }
	  .invoice-number-field {
	    display: flex; align-items: center; border: 1px solid #e0e0e0;
	    border-radius: 5px; background: #fafafa; overflow: hidden;
	  }
	  .invoice-number-prefix {
	    padding: 9px 0 9px 12px; font-size: 13px; color: #1a1a1a;
	    white-space: nowrap;
	  }
	  .invoice-number-suffix {
	    border: none; background: transparent; padding-left: 2px;
	    text-transform: uppercase; letter-spacing: 0.5px;
	  }
	  .invoice-number-field:focus-within {
	    border-color: #C0392B; background: #fff;
	  }
	  .unit-input-field {
	    display: flex; align-items: center; border: 1px solid #e0e0e0;
	    border-radius: 5px; background: #fafafa; overflow: hidden;
	  }
	  .unit-input {
	    border: none; background: transparent;
	  }
	  .unit-suffix {
	    padding: 9px 12px 9px 0; font-size: 13px; color: #8f8f8f;
	    white-space: nowrap;
	  }
	  .unit-input-field:focus-within {
	    border-color: #C0392B; background: #fff;
	  }

  .immat-input { text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

  .lines-area { margin-top: 8px; }
  .line-row {
    display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px;
    padding: 10px 12px; background: #fafafa; border-radius: 6px; border: 1px solid #eee;
  }
  .line-row .lf { flex: 3; }
  .line-row .lf-sm { flex: 1; }

  .btn-add {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; background: #f5f5f5; border: 1px dashed #ccc;
    border-radius: 5px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: #888; cursor: pointer; margin-top: 4px;
  }
  .btn-add:hover { background: #eee; color: #555; }

  .btn-remove {
    padding: 8px 10px; background: none; border: none;
    color: #ccc; font-size: 16px; cursor: pointer; border-radius: 4px;
  }
  .btn-remove:hover { color: #C0392B; background: #fee; }

  .generate-btn {
    display: block; width: 100%; padding: 14px;
    background: #1a1a1a; color: #fff; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    font-weight: 600; cursor: pointer; margin-top: 8px;
  }
  .generate-btn:hover { background: #333; }

  /* ════════ PRINT VIEW ════════ */
  .print-view { display: none; }
  .print-view.active { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
  #documentPages { width: 210mm; display: flex; flex-direction: column; gap: 14px; }

  .toolbar { width: 210mm; display: flex; gap: 10px; margin-bottom: 14px; }
  .toolbar button {
    padding: 10px 20px; border: none; border-radius: 5px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .tb-print { background: #1a1a1a; color: #fff; flex: 1; }
  .tb-print:hover { background: #333; }
  .tb-back { background: #eee; color: #555; }
  .tb-back:hover { background: #ddd; }

  /* ════════ A4 ════════ */
  @page { size: A4; margin: 0; }

  .a4 {
    width: 210mm; height: 297mm; background: #fff;
    padding: 15mm 20mm 14mm 20mm;
    position: relative; box-shadow: 0 4px 30px rgba(0,0,0,0.12);
    overflow: hidden; font-size: 11px; line-height: 1.45;
    page-break-after: always;
  }
  .a4:last-child { page-break-after: auto; }

  @media print {
    body { background: #fff; }
    .form-view, .toolbar { display: none !important; }
    .print-view { display: flex !important; padding: 0; }
    .a4 { box-shadow: none; }
    #documentPages { gap: 0; }
  }

  /* ── Invoice inner styles ── */
  .i-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 12px; border-bottom: 2.5px solid #1a1a1a; margin-bottom: 14px;
  }
  .i-logo-img { display: flex; align-items: flex-start; margin-left: -10px; background: #fff; }
  .i-logo-img img { max-width: 240px; width: 100%; height: auto; display: block; background: #fff; }
  .i-logo-sub { font-size: 12px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: #1a1a1a; margin-top: -1px; }
  .i-logo-tag { font-size: 8.5px; color: #666; letter-spacing: 1.8px; text-transform: uppercase; margin-top: 2px; }
  .i-title { text-align: right; }
  .i-title h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .i-title .i-num { font-size: 11px; color: #777; margin-top: 1px; }

  .i-info { display: flex; gap: 30px; margin-bottom: 12px; }
  .i-info > div { flex: 1; }
  .i-lbl { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.2px; color: #b0b0b0; margin-bottom: 4px; }
  .i-info p { font-size: 11px; line-height: 1.55; color: #333; }
  .i-info strong { font-weight: 600; color: #1a1a1a; }

  .i-meta { display: flex; gap: 36px; padding: 8px 0; border-top: 1px solid #e5e5e5; border-bottom: 1px solid #e5e5e5; margin-bottom: 12px; }
  .i-mi { display: flex; flex-direction: column; gap: 1px; }
  .i-ml { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: #b0b0b0; }
  .i-mv { font-size: 11px; font-weight: 500; }

  .i-veh { margin-bottom: 12px; padding: 10px 14px; background: #fafafa; border-left: 3px solid #C0392B; border-radius: 3px; }
  .i-veh h3 { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.2px; color: #b0b0b0; margin-bottom: 6px; }
  .i-vtbl { width: 100%; border-collapse: collapse; }
  .i-vtbl td { padding: 3px 5px; font-size: 10.5px; border-bottom: 1px solid #eee; }
  .i-vtbl tr:last-child td { border-bottom: none; }
  .i-vl { width: 130px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; }
  .i-vv { font-weight: 500; color: #1a1a1a; }

  .i-tbl { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .i-tbl thead th {
    font-size: 8.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.8px; color: #b0b0b0; padding: 7px 5px;
    border-bottom: 2px solid #1a1a1a; text-align: left;
  }
  .i-tbl thead th.r { text-align: right; }
  .i-tbl thead th.c { text-align: center; }
  .i-tbl tbody td { font-size: 11px; padding: 8px 5px; border-bottom: 1px solid #eee; color: #333; vertical-align: top; }
  .i-tbl tbody td.r { text-align: right; }
  .i-tbl tbody td.c { text-align: center; }
  .i-desc { font-size: 9.5px; color: #999; }

  .i-totals { display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .i-tbox { width: 240px; }
  .i-tl { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; color: #555; }
  .i-tl.sub { border-bottom: 1px solid #eee; padding-bottom: 6px; margin-bottom: 2px; }
  .i-tl.disc { color: #C0392B; font-weight: 500; }
  .i-tl.grand { border-top: 2.5px solid #1a1a1a; margin-top: 4px; padding-top: 7px; font-weight: 700; font-size: 13px; color: #1a1a1a; }
  .i-tl.paid { font-size: 10.5px; color: #888; }
  .i-tl.due { background: #1a1a1a; color: #fff; font-weight: 700; font-size: 11px; padding: 6px 8px; margin-top: 4px; }

  .i-pay { padding-top: 10px; border-top: 1px solid #eee; }
  .i-pay h4 { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.2px; color: #b0b0b0; margin-bottom: 5px; }
  .i-pay p { font-size: 10px; color: #666; line-height: 1.6; }

  .i-footer {
    position: absolute; bottom: 7mm; left: 20mm; right: 20mm;
    text-align: center; font-size: 8px; color: #b0b0b0; line-height: 1.65;
    border-top: 1px solid #eee; padding-top: 7px;
  }
  .i-footer strong { color: #888; font-weight: 500; }
  .facture-page .i-footer,
  .attestation-page .i-footer,
  .garantie-page .i-footer {
    bottom: 7mm; left: 20mm; right: 20mm;
    padding-top: 7px; font-size: 8px; line-height: 1.65;
  }

  .i-note {
    margin-bottom: 12px; padding: 10px 14px; background: #fafafa;
    border: 1px solid #eee; border-radius: 4px;
  }
  .i-note h3 {
    font-size: 8.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2.2px; color: #b0b0b0; margin-bottom: 6px;
  }
  .i-note p { font-size: 10.5px; color: #444; line-height: 1.65; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .list { list-style: none; padding: 0; margin: 0; }
  .list li { position: relative; padding-left: 16px; margin-bottom: 7px; font-size: 10.5px; color: #444; }
  .list li::before {
    content: ''; position: absolute; left: 0; top: 7px;
    width: 6px; height: 6px; border-radius: 50%; background: #C0392B;
  }
  .tick {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: #1a1a1a; color: #fff; font-size: 10px; font-weight: 700;
  }
  .signatures { display: flex; gap: 24px; margin-top: 16px; }
  .sig-box {
    flex: 1; min-height: 95px; border: 1px solid #e5e5e5;
    border-radius: 4px; padding: 10px 12px;
  }
  .sig-box h4 {
    font-size: 8.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: #b0b0b0; margin-bottom: 10px;
  }
  .sig-line {
    margin-top: 42px; padding-top: 8px; border-top: 1px solid #ddd;
    font-size: 10px; color: #666;
  }
  .facture-page .i-header,
  .attestation-page .i-header,
  .garantie-page .i-header { padding-bottom: 10px; margin-bottom: 10px; }
  .facture-page .i-logo-img img,
  .attestation-page .i-logo-img img,
  .garantie-page .i-logo-img img { max-width: 225px; }
  .facture-page .i-title h1,
  .attestation-page .i-title h1,
  .garantie-page .i-title h1 { font-size: 20px; }
  .facture-page .i-title .i-num,
  .attestation-page .i-title .i-num,
  .garantie-page .i-title .i-num { font-size: 10px; }
  .attestation-page .i-note { margin-bottom: 10px; padding: 9px 12px; }
  .attestation-page .i-note p { font-size: 10px; line-height: 1.55; }
  .attestation-page .i-tbl tbody td { padding: 6px 5px; }
  .attestation-page .i-info { gap: 24px; margin-bottom: 10px; }
  .attestation-page .i-info p { font-size: 10px; line-height: 1.45; }
  .attestation-page .i-meta { gap: 24px; padding: 7px 0; margin-bottom: 10px; }
  .attestation-page .i-veh { margin-bottom: 10px; padding: 9px 12px; }
  .attestation-page .i-veh h3 { margin-bottom: 5px; }
  .attestation-page .i-vtbl td { padding: 2px 5px; font-size: 10px; }
  .attestation-page .i-tbl { margin-bottom: 10px; }
  .attestation-page .i-tbl thead th { padding: 6px 5px; }
  .attestation-page .signatures { margin-top: 10px; margin-bottom: 32mm; gap: 16px; }
  .attestation-page .sig-box { min-height: 74px; padding: 9px 10px; }
  .attestation-page .sig-box h4 { margin-bottom: 6px; }
  .attestation-page .sig-line { margin-top: 24px; }
  .garantie-page { padding: 11mm 18mm 12mm 18mm; line-height: 1.35; }
  .garantie-page .i-info { gap: 22px; margin-bottom: 8px; }
  .garantie-page .i-info p { font-size: 10px; line-height: 1.4; }
  .garantie-page .i-meta { gap: 24px; padding: 6px 0; margin-bottom: 8px; }
  .garantie-page .i-ml { font-size: 7.5px; }
  .garantie-page .i-mv { font-size: 10px; }
  .garantie-page .i-veh { margin-bottom: 8px; padding: 8px 12px; }
  .garantie-page .i-veh h3 { margin-bottom: 4px; }
  .garantie-page .i-vtbl td { padding: 2px 4px; font-size: 10px; }
  .garantie-page .i-note { margin-bottom: 8px; padding: 8px 12px; }
  .garantie-page .i-note h3 { margin-bottom: 4px; font-size: 8px; letter-spacing: 1.8px; }
  .garantie-page .i-note p { font-size: 9.6px; line-height: 1.42; }
  .garantie-page .i-note p + p { margin-top: 4px; }
  .garantie-page .signatures { margin-top: 8px; margin-bottom: 26mm; gap: 18px; }
  .garantie-page .sig-box { min-height: 64px; padding: 10px 12px; }
  .garantie-page .sig-box h4 { margin-bottom: 6px; }
  .garantie-page .sig-line { margin-top: 18px; }

  .print-btn {
    position: fixed; top: 16px; right: 16px;
    padding: 9px 20px; background: #1a1a1a; color: #fff; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; border-radius: 4px; z-index: 100;
  }
  .print-btn:hover { background: #333; }
</style>
</head>
<body>

<!-- ═══════════ FORMULAIRE ═══════════ -->
<div class="form-view" id="formView">
  <div class="form-header">
    <div class="fh-logo"><img src="logo_dujardin.png" alt="Dujardin Automobile"></div>
    <div class="fh-sub">Automobile</div>
    <h2>Générateur de Dossier Client</h2>
    <p>Remplissez les champs et générez votre facture A4</p>
  </div>

  <div class="card">
    <h3>Informations facture</h3>
    <div class="row">
	      <div>
	        <label>N° Facture</label>
	        <div class="invoice-number-field">
	          <span class="invoice-number-prefix">FA-2026-</span>
	          <input id="f_num_suffix" class="invoice-number-suffix" maxlength="4" placeholder="XXXX" oninput="formatInvoiceSuffix(this)">
	        </div>
	      </div>
      <div><label>Date d'émission</label><input id="f_date" type="date"></div>
    </div>
    <div class="row">
      <div><label>Mode de paiement</label>
        <select id="f_pay">
          <option>Chèque bancaire</option>
          <option>Virement bancaire</option>
        </select>
      </div>
      <div><label>N° Dossier</label><input id="f_cmd" oninput="formatUppercase(this)" style="text-transform: uppercase;"></div>
    </div>
  </div>

  <div class="card">
    <h3>Client</h3>
    <div class="row">
      <div><label>Nom</label><input id="c_nom" oninput="formatUppercase(this)" style="text-transform: uppercase;"></div>
      <div><label>Prénom</label><input id="c_prenom" oninput="formatUppercase(this)" style="text-transform: uppercase;"></div>
    </div>
    <div class="row">
      <div><label>Adresse</label><input id="c_addr"></div>
      <div><label>Code postal & Ville</label><input id="c_city"></div>
    </div>
    <div class="row">
      <div><label>Téléphone</label><input id="c_tel" placeholder="06 12 34 56 78" maxlength="14" oninput="formatPhone(this)"></div>
    </div>
  </div>

  <div class="card">
    <h3>Véhicule vendu</h3>
    <div class="row">
      <div><label>Marque</label><input id="v_marque"></div>
      <div><label>Modèle</label><input id="v_modele"></div>
    </div>
    <div class="row">
      <div><label>Année</label><input id="v_annee"></div>
      <div><label>Mise en circulation</label><input id="v_mec" placeholder="JJ/MM/AAAA" maxlength="10" oninput="formatDate(this)"></div>
    </div>
    <div class="row">
      <div>
        <label>Immatriculation</label>
        <input id="v_immat" class="immat-input" placeholder="AA-123-BB" maxlength="9" oninput="formatImmat(this)">
      </div>
      <div><label>N° VIN</label><input id="v_vin" placeholder="SAJXXXXXXXXXXXXXX" maxlength="17" oninput="formatVin(this)"></div>
    </div>
    <div class="row">
	      <div>
	        <label>Kilométrage</label>
	        <div class="unit-input-field">
	          <input id="v_km" class="unit-input" inputmode="numeric" oninput="formatMileage(this)">
	          <span class="unit-suffix">km</span>
	        </div>
	      </div>
      <div><label>Énergie</label>
        <select id="v_energie">
          <option selected>Diesel</option>
          <option>Essence</option>
          <option>Hybride</option>
          <option>Électrique</option>
          <option>GPL</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div><label>Transmission</label>
        <select id="v_boite">
          <option selected>Automatique</option>
          <option>Manuelle</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Véhicule repris</h3>
    <div class="row">
      <div><label>Véhicule repris ?</label>
        <select id="r_has" onchange="toggleReprise()">
          <option>Non</option>
          <option>Oui</option>
        </select>
      </div>
    </div>
    <div id="repriseFields" style="display: none;">
      <div class="row">
        <div><label>Marque</label><input id="r_marque"></div>
        <div><label>Modèle</label><input id="r_modele"></div>
      </div>
      <div class="row">
        <div><label>Immatriculation</label><input id="r_immat" class="immat-input" placeholder="AA-123-BB" maxlength="9" oninput="formatImmat(this)"></div>
	        <div>
	          <label>Kilométrage</label>
	          <div class="unit-input-field">
	            <input id="r_km" class="unit-input" inputmode="numeric" oninput="formatMileage(this)">
	            <span class="unit-suffix">km</span>
	          </div>
	        </div>
      </div>
      <div class="row">
        <div><label>Montant (€)</label><input id="r_montant" type="number" step="0.01"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Carte grise</h3>
    <div class="row">
      <div><label>Carte grise offerte ?</label>
        <select id="cg_offerte" onchange="toggleCarteGrise()">
          <option>Oui</option>
          <option>Non</option>
        </select>
      </div>
    </div>
    <div id="carteGriseFields" style="display: none;">
      <div class="row">
        <div><label>Prix de la carte grise (€)</label><input id="cg_montant" type="number" step="0.01"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Lignes de facturation</h3>
    <div class="lines-area" id="linesArea">
      <div class="line-row" data-idx="0">
        <div class="lf"><label>Désignation</label><input class="l-des" value=""></div>
        <div class="lf-sm"><label>Prix HT</label><input class="l-ht" type="number" value="" step="0.01" readonly></div>
        <div class="lf-sm"><label>Prix TTC</label><input class="l-ttc" type="number" value="" step="0.01" oninput="calculateTVA(this)"></div>
        <div class="lf-sm"><label>TVA %</label><input class="l-tva" type="number" value="" step="0.01" readonly></div>
        <button class="btn-remove" onclick="removeLine(this)" title="Supprimer">×</button>
      </div>

<script>
// ── Auto-format immatriculation AA-123-BB ──
function formatImmat(input) {
  let v = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  let result = '';
  for (let i = 0; i < v.length && i < 7; i++) {
    if (i === 2 || i === 5) result += '-';
    result += v[i];
  }
  input.value = result;
}

function formatPhone(input) {
  let digits = input.value.replace(/\D/g, '').slice(0, 10);
  let spaced = digits.replace(/(\d{2})(?=\d)/g, '$1 ');
  input.value = spaced;
}

function formatVin(input) {
  let value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 17);
  input.value = value;
  if (value.length !== 17) {
    input.classList.add('invalid');
  } else {
    input.classList.remove('invalid');
  }
}

function formatDate(input) {
  let digits = input.value.replace(/\D/g, '').slice(0, 8);
  if (digits.length <= 2) {
    input.value = digits;
  } else if (digits.length <= 4) {
    input.value = digits.slice(0, 2) + '/' + digits.slice(2);
  } else {
    input.value = digits.slice(0, 2) + '/' + digits.slice(2, 4) + '/' + digits.slice(4);
  }
}

function formatUppercase(input) {
  input.value = input.value.toUpperCase();
}

function formatInvoiceSuffix(input) {
  input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4);
}

function formatMileage(input) {
  input.value = input.value.replace(/\D/g, '');
}

function toggleReprise() {
  const has = document.getElementById('r_has').value === 'Oui';

}

    <div class="lf-sm"><label>TVA %</label><input class="l-tva" type="number" value="" step="0.01" readonly></div>
    <button class="btn-remove" onclick="removeLine(this)" title="Supprimer">×</button>
    </div>
  `;
  area.appendChild(div);
}

function calculateTVA(input) {
  const row = input.closest('.line-row');
  const ttcValue = row.querySelector('.l-ttc').value.trim();
  if (!ttcValue) {
    row.querySelector('.l-ht').value = '';
    row.querySelector('.l-tva').value = '';
    return;
  }
  const ttc = parseFloat(ttcValue) || 0;
  const ht = ttc / 1.2;
  row.querySelector('.l-ht').value = ht.toFixed(2);
  row.querySelector('.l-tva').value = '20.00';
}

function removeLine(btn) {
  const area = document.getElementById('linesArea');
  if (area.children.length > 1) btn.parentElement.remove();
}

function fmt(n) {
  return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function fmtKm(value) {
  const digits = (value || '').toString().replace(/\D/g, '');
  return digits ? digits.replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' km' : '';
}
